<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pulse — Health Agent</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #d9d8d2; font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }
  body.dark { background: #050605; }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; box-sizing: border-box; }
  #root { height: 100vh; display: flex; align-items: center; justify-content: center; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="tokens.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "language": "en",
  "screen": "history",
  "showWatchPreview": true
}/*EDITMODE-END*/;

const NAV_ITEMS = [
  { k: 'today',   label: { en: 'Today',   zh: '今日' } },
  { k: 'history', label: { en: 'History', zh: '历史' } },
  { k: 'coach',   label: { en: 'Coach',   zh: '教练' } },
  { k: 'report',  label: { en: 'Reports', zh: '报告' } },
];

function TabBar({ t, active, onChange, lang }) {
  return (
    <div style={{
      position: 'absolute', bottom: 0, left: 0, right: 0,
      padding: '10px 14px 26px',
      background: `linear-gradient(to top, ${t.bg} 60%, ${t.bg}00)`,
      display: 'flex', justifyContent: 'space-between', gap: 6,
      zIndex: 5,
    }}>
      <div style={{
        display: 'flex', flex: 1, gap: 4,
        background: t.bgElev, border: `0.5px solid ${t.line}`,
        borderRadius: 999, padding: 4,
      }}>
        {NAV_ITEMS.map(n => (
          <div key={n.k} onClick={() => onChange(n.k)} style={{
            flex: 1, padding: '10px 6px', textAlign: 'center', cursor: 'pointer',
            borderRadius: 999,
            background: active === n.k ? t.ink : 'transparent',
            color: active === n.k ? t.bg : t.inkMid,
            fontFamily: '"JetBrains Mono", ui-monospace, monospace',
            fontSize: 10, fontWeight: 600, letterSpacing: 0.6, textTransform: 'uppercase',
            transition: 'all 0.18s',
          }}>{n.label[lang]}</div>
        ))}
      </div>
    </div>
  );
}

// Watch face preview — small companion device
function WatchPreview({ t, lang }) {
  const D = PulseDemo;
  return (
    <div style={{
      width: 200, height: 240,
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      gap: 14,
    }}>
      <div style={{
        width: 168, height: 200, borderRadius: 38,
        background: t.bg === '#0B0C0A' ? '#000' : '#1a1a18',
        padding: 6, position: 'relative',
        boxShadow: '0 12px 40px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.15)',
      }}>
        <div style={{
          position: 'absolute', right: -6, top: 60, width: 8, height: 24,
          background: '#222', borderRadius: '0 4px 4px 0',
        }} />
        <div style={{
          width: '100%', height: '100%', borderRadius: 32,
          background: '#000', overflow: 'hidden',
          display: 'flex', flexDirection: 'column', padding: '14px 16px',
          color: '#F2F1EC',
        }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
            fontFamily: '"JetBrains Mono", ui-monospace, monospace',
            fontSize: 9, letterSpacing: 0.6, color: '#888',
          }}>
            <span>9:41</span>
            <span style={{ color: '#D2FF3D' }}>● 47d</span>
          </div>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
            <div style={{
              fontSize: 70, fontWeight: 250, letterSpacing: -2.5,
              fontVariantNumeric: 'tabular-nums', lineHeight: 0.9,
            }}>{D.score}</div>
            <div style={{
              fontFamily: '"JetBrains Mono", monospace',
              fontSize: 9, color: '#D2FF3D', letterSpacing: 0.8, marginTop: 4,
            }}>GREAT · TRAIN HARD</div>
          </div>
          <div style={{
            display: 'flex', justifyContent: 'space-between',
            fontFamily: '"JetBrains Mono", monospace', fontSize: 8.5, color: '#888', letterSpacing: 0.4,
          }}>
            <div>HRV 58</div>
            <div>RHR 54</div>
            <div>SLP 7.8</div>
          </div>
        </div>
      </div>
      <div style={{
        fontFamily: '"JetBrains Mono", monospace', fontSize: 9,
        color: t.inkDim, letterSpacing: 0.6, textTransform: 'uppercase',
      }}>Watch · Glance tier</div>
    </div>
  );
}

function App() {
  const tw = useTweaks(TWEAK_DEFAULTS);
  const t = PulseTokens[tw.theme] || PulseTokens.light;
  const [screen, setScreen] = useState(tw.screen || 'today');
  const lang = tw.language;

  useEffect(() => {
    document.body.classList.toggle('dark', tw.theme === 'dark');
  }, [tw.theme]);

  useEffect(() => { setScreen(tw.screen); }, [tw.screen]);

  const navigate = (s, m) => {
    setTweak('screen', s);
    if (m) setTweak('vitalMetric', m);
  };
  const back = () => { setTweak('screen', 'today'); };

  let body;
  switch (screen) {
    case 'vital':   body = <VitalScreen   t={t} lang={lang} metric={tw.vitalMetric || 'hrv'} onBack={back} />; break;
    case 'workout': body = <WorkoutScreen t={t} onBack={back} />; break;
    case 'sleep':   body = <SleepScreen   t={t} lang={lang} onBack={back} />; break;
    case 'history': body = <HistoryScreen t={t} onBack={back} />; break;
    case 'coach':   body = <CoachScreen   t={t} lang={lang} onBack={back} />; break;
    case 'report':  body = <ReportScreen  t={t} lang={lang} onBack={back} />; break;
    default:        body = <TodayScreen   t={t} lang={lang} onNavigate={navigate} />;
  }

  // Top bar (inside frame)
  const TopBar = () => (
    <div style={{
      padding: '6px 22px 10px',
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{
          width: 22, height: 22, borderRadius: 6,
          background: t.ink, color: t.bg,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: '"JetBrains Mono", monospace', fontWeight: 700, fontSize: 12,
        }}>P</div>
        <span style={{
          fontFamily: '"JetBrains Mono", monospace', fontSize: 12,
          fontWeight: 600, color: t.ink, letterSpacing: 1,
        }}>PULSE</span>
      </div>
      <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
        <div style={{
          padding: '4px 8px', borderRadius: 999,
          background: t.chipBg, fontFamily: '"JetBrains Mono", monospace',
          fontSize: 10, color: t.ink, letterSpacing: 0.5,
        }}>● live</div>
        <div style={{
          width: 32, height: 32, borderRadius: 16, background: t.chipBg,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: t.ink, fontSize: 14,
        }}>≡</div>
      </div>
    </div>
  );

  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      gap: 40, padding: 20,
      background: tw.theme === 'dark' ? '#050605' : '#d9d8d2',
      transition: 'background 0.3s',
    }}>
      {/* Phone */}
      <IOSDevice dark={tw.theme === 'dark'}>
        <div style={{
          width: '100%', height: '100%', background: t.bg,
          display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative',
          fontFamily: lang === 'zh'
            ? '"Noto Sans SC", "Inter", system-ui, sans-serif'
            : '"Inter", "Noto Sans SC", system-ui, sans-serif',
          color: t.ink,
        }}>
          <IOSStatusBar dark={tw.theme === 'dark'} time="9:41" />
          <TopBar />
          <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden' }}>{body}</div>
          <TabBar t={t} active={['today','history','coach','report'].includes(screen) ? screen : 'today'} onChange={(k) => setTweak('screen', k)} lang={lang} />
        </div>
      </IOSDevice>

      {/* Watch */}
      {tw.showWatchPreview && <WatchPreview t={t} lang={lang} />}

      {/* Tweaks */}
      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio label="Mode" k="theme" t={tw} options={[
            { v: 'light', l: 'Light' },
            { v: 'dark', l: 'Dark' },
          ]} />
          <TweakRadio label="Language" k="language" t={tw} options={[
            { v: 'en', l: 'EN' },
            { v: 'zh', l: '中文' },
          ]} />
        </TweakSection>
        <TweakSection title="Navigate">
          <TweakSelect label="Screen" k="screen" t={tw} options={[
            { v: 'today',   l: 'Today / Readiness' },
            { v: 'vital',   l: 'Vital detail · HRV' },
            { v: 'workout', l: 'Live workout' },
            { v: 'sleep',   l: 'Sleep analysis' },
            { v: 'history', l: 'History' },
            { v: 'coach',   l: 'Coach' },
            { v: 'report',  l: 'Weekly report' },
          ]} />
        </TweakSection>
        <TweakSection title="Companion">
          <TweakToggle label="Show Watch glance" k="showWatchPreview" t={tw} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

// Tweak helpers (use the tweaks-panel hook + lightweight wrappers)
let setTweak = () => {};
function useTweaks(defaults) {
  const [state, setState] = useState(defaults);
  setTweak = (k, v) => {
    if (typeof k === 'object') {
      setState(s => ({ ...s, ...k }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: k }, '*');
    } else {
      setState(s => ({ ...s, [k]: v }));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
    }
  };
  return state;
}
function TweakSection({ title, children }) {
  return <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 14 }}>
    <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 9.5, fontWeight: 600, letterSpacing: 0.8, textTransform: 'uppercase', color: '#888' }}>{title}</div>
    {children}
  </div>;
}
function TweakRadio({ label, k, t, options }) {
  return <div>
    <div style={{ fontSize: 11, color: '#999', marginBottom: 4 }}>{label}</div>
    <div style={{ display: 'flex', gap: 4, background: '#fff1', borderRadius: 8, padding: 3 }}>
      {options.map(o => (
        <div key={o.v} onClick={() => setTweak(k, o.v)} style={{
          flex: 1, padding: '6px 8px', textAlign: 'center', cursor: 'pointer',
          borderRadius: 6, background: t[k] === o.v ? '#fff' : 'transparent',
          color: t[k] === o.v ? '#000' : '#ccc',
          fontSize: 12, fontWeight: 500,
        }}>{o.l}</div>
      ))}
    </div>
  </div>;
}
function TweakSelect({ label, k, t, options }) {
  return <div>
    <div style={{ fontSize: 11, color: '#999', marginBottom: 4 }}>{label}</div>
    <select value={t[k]} onChange={e => setTweak(k, e.target.value)} style={{
      width: '100%', padding: '7px 10px', borderRadius: 8,
      background: '#222', color: '#fff', border: '1px solid #333',
      fontSize: 12, fontFamily: 'inherit',
    }}>
      {options.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
    </select>
  </div>;
}
function TweakToggle({ label, k, t }) {
  return <div onClick={() => setTweak(k, !t[k])} style={{
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    cursor: 'pointer', padding: '4px 0',
  }}>
    <span style={{ fontSize: 12, color: '#ddd' }}>{label}</span>
    <div style={{
      width: 32, height: 18, borderRadius: 9,
      background: t[k] ? '#7BD68A' : '#444',
      position: 'relative', transition: 'background 0.2s',
    }}>
      <div style={{
        position: 'absolute', top: 2, left: t[k] ? 16 : 2,
        width: 14, height: 14, borderRadius: 7, background: '#fff',
        transition: 'left 0.2s',
      }} />
    </div>
  </div>;
}

// Minimal panel wrapper (drop-in if starter not loaded)
function TweaksPanel({ title, children }) {
  const [open, setOpen] = useState(true);
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  if (!open) return null;
  return (
    <div style={{
      position: 'fixed', right: 20, top: 20, width: 240,
      background: '#0e0f0d', color: '#eee',
      border: '1px solid #222', borderRadius: 14,
      padding: 16, fontFamily: '"Inter", system-ui, sans-serif',
      boxShadow: '0 12px 40px rgba(0,0,0,0.5)', zIndex: 100,
    }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        marginBottom: 14, paddingBottom: 10, borderBottom: '1px solid #1f1f1d',
      }}>
        <span style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 11, fontWeight: 600, letterSpacing: 1 }}>{title}</span>
        <span onClick={() => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }} style={{ cursor: 'pointer', color: '#666', fontSize: 14 }}>×</span>
      </div>
      {children}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
