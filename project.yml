name: PulseWatch
options:
  bundleIdPrefix: com.abundra.pulse
  developmentLanguage: en
  knownRegions: [en, zh-Hans]
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: WRH82M8L9U
    CODE_SIGN_STYLE: Automatic

targets:
  PulseWatch:
    type: application
    platform: iOS
    sources:
      - path: PulseWatch
      - path: Shared
    resources:
      - path: PulseWatch/Assets.xcassets
      - path: PulseWatch/App/PrivacyInfo.xcprivacy
      - path: PulseWatch/Localizable.xcstrings
      - path: PulseWatch/App/InfoPlist.xcstrings
    info:
      path: PulseWatch/App/Info.plist
      properties:
        CFBundleDisplayName: "Pulse"
        NSCameraUsageDescription: "Pulse needs access to the camera to scan OpenClaw pairing QR codes."
        NSHealthShareUsageDescription: "Pulse needs to read your health data to generate daily readiness scores and training insights. All data is stored on your device only."
        NSHealthUpdateUsageDescription: "Pulse needs to record your workout data to track your training progress."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Pulse uses your location to detect when you arrive at the gym and suggest training plans. Location data is never uploaded to any server."
        NSLocationWhenInUseUsageDescription: "Pulse uses your location to save your frequent places for smart reminders."
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - pulse-health
            CFBundleURLName: com.abundra.pulse.openclaw
        UIBackgroundModes:
          - location
          - processing
          - fetch
          - health-update
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - com.abundra.pulse.morning-brief-refresh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse
        CODE_SIGN_ENTITLEMENTS: PulseWatch/App/PulseWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: PulseWatchWidget
      - package: TelemetryDeck
        product: TelemetryDeck
    entitlements:
      path: PulseWatch/App/PulseWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.abundra.pulse.shared

  PulseWatchWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PulseWatchWidget
    info:
      path: PulseWatchWidget/Info.plist
      properties:
        CFBundleDisplayName: "Pulse Widget"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse.widget
        INFOPLIST_FILE: PulseWatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: PulseWatchWidget/PulseWatchWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: PulseWatchWidget/PulseWatchWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.abundra.pulse.shared

  PulseWatchWatch:
    type: application
    platform: watchOS
    sources:
      - path: PulseWatchWatch
        excludes:
          - "Complications/**"
      - path: Shared
    dependencies:
      - target: PulseWatchWatchWidgetExtension
      - package: TelemetryDeck
        product: TelemetryDeck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse.watchkitapp
        INFOPLIST_FILE: PulseWatchWatch/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: PulseWatchWatch/App/PulseWatchWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: PulseWatchWatch/App/PulseWatchWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.abundra.pulse.shared

  PulseWatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PulseWatchUITests
    info:
      path: PulseWatchUITests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse.uitests
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        TEST_TARGET_NAME: PulseWatch
    dependencies:
      - target: PulseWatch

  PulseWatchWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: PulseWatchWatch/Complications
      - path: Shared/Theme
      - path: Shared/Models
    dependencies:
      - framework: SwiftData.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse.watchkitapp.widget
        INFOPLIST_FILE: PulseWatchWatch/Complications/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: PulseWatchWatch/Complications/PulseWatchWatchWidgetExtension.entitlements
      properties: {}

packages:
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"

schemes:
  PulseWatch:
    build:
      targets:
        PulseWatch: all
        PulseWatchUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PulseWatchUITests

  PulseWatchWatch:
    build:
      targets:
        PulseWatchWatch: all
    run:
      config: Debug
