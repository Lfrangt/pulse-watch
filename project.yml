name: PulseWatch
options:
  bundleIdPrefix: com.abundra.pulse
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: WRH82M8L9U
    CODE_SIGN_STYLE: Automatic

targets:
  PulseWatch:
    type: application
    platform: iOS
    sources:
      - path: PulseWatch
      - path: Shared
    info:
      path: PulseWatch/App/Info.plist
      properties:
        NSHealthShareUsageDescription: "Pulse 需要读取你的健康数据来生成每日状态评分和训练建议。所有数据仅存储在你的设备上。"
        NSHealthUpdateUsageDescription: "Pulse 需要记录你的运动数据。"
        NSLocationAlwaysAndWhenInUseUsageDescription: "Pulse 使用位置来检测你是否到达健身房，自动建议训练计划。位置数据不会上传到任何服务器。"
        NSLocationWhenInUseUsageDescription: "Pulse 使用位置来保存你的常去地点。"
        UIBackgroundModes:
          - location
          - processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse
        CODE_SIGN_ENTITLEMENTS: PulseWatch/App/PulseWatch.entitlements
    entitlements:
      path: PulseWatch/App/PulseWatch.entitlements
      properties:
        com.apple.developer.healthkit: true

  PulseWatchWatch:
    type: application
    platform: watchOS
    sources:
      - path: PulseWatchWatch
        excludes:
          - "Complications/**"
      - path: Shared
    dependencies:
      - target: PulseWatchWatchWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse.watchkitapp
        INFOPLIST_FILE: PulseWatchWatch/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: PulseWatchWatch/App/PulseWatchWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
    entitlements:
      path: PulseWatchWatch/App/PulseWatchWatch.entitlements
      properties:
        com.apple.developer.healthkit: true

  PulseWatchWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: PulseWatchWatch/Complications
      - path: Shared/Theme
      - path: Shared/Models
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse.watchkitapp.widget
        INFOPLIST_FILE: PulseWatchWatch/Complications/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: PulseWatchWatch/Complications/PulseWatchWatchWidgetExtension.entitlements
      properties: {}

schemes:
  PulseWatch:
    build:
      targets:
        PulseWatch: all
        PulseWatchWatch: all
    run:
      config: Debug

  PulseWatchWatch:
    build:
      targets:
        PulseWatchWatch: all
    run:
      config: Debug
