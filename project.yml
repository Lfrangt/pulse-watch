name: PulseWatch
options:
  bundleIdPrefix: com.abundra.pulse
  developmentLanguage: zh-Hans
  knownRegions: [zh-Hans, en]
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: WRH82M8L9U
    CODE_SIGN_STYLE: Automatic

targets:
  PulseWatch:
    type: application
    platform: iOS
    sources:
      - path: PulseWatch
      - path: Shared
    resources:
      - path: PulseWatch/Assets.xcassets
      - path: PulseWatch/App/PrivacyInfo.xcprivacy
      - path: Localizable.xcstrings
    info:
      path: PulseWatch/App/Info.plist
      properties:
        CFBundleDisplayName: "Pulse"
        NSCameraUsageDescription: "Pulse 需要相机来扫描 OpenClaw 配对二维码。"
        NSHealthShareUsageDescription: "Pulse 需要读取你的健康数据来生成每日状态评分和训练建议。所有数据仅存储在你的设备上。"
        NSHealthUpdateUsageDescription: "Pulse 需要记录你的运动数据以追踪你的训练进度。"
        NSLocationAlwaysAndWhenInUseUsageDescription: "Pulse 使用位置来检测你是否到达健身房，自动建议训练计划。位置数据不会上传到任何服务器。"
        NSLocationWhenInUseUsageDescription: "Pulse 使用位置来保存你的常去地点，用于智能提醒。"
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - pulse-health
            CFBundleURLName: com.abundra.pulse.openclaw
        UIBackgroundModes:
          - location
          - processing
          - health-update
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse
        CODE_SIGN_ENTITLEMENTS: PulseWatch/App/PulseWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: PulseWatchWidget
      - package: TelemetryDeck
        product: TelemetryDeck
    entitlements:
      path: PulseWatch/App/PulseWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.abundra.pulse.shared

  PulseWatchWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PulseWatchWidget
    info:
      path: PulseWatchWidget/Info.plist
      properties:
        CFBundleDisplayName: "Pulse Widget"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse.widget
        INFOPLIST_FILE: PulseWatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: PulseWatchWidget/PulseWatchWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: PulseWatchWidget/PulseWatchWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.abundra.pulse.shared

  PulseWatchWatch:
    type: application
    platform: watchOS
    sources:
      - path: PulseWatchWatch
        excludes:
          - "Complications/**"
      - path: Shared
    dependencies:
      - target: PulseWatchWatchWidgetExtension
      - package: TelemetryDeck
        product: TelemetryDeck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse.watchkitapp
        INFOPLIST_FILE: PulseWatchWatch/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: PulseWatchWatch/App/PulseWatchWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: PulseWatchWatch/App/PulseWatchWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.abundra.pulse.shared

  PulseWatchWatchWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - path: PulseWatchWatch/Complications
      - path: Shared/Theme
      - path: Shared/Models
    dependencies:
      - framework: SwiftData.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abundra.pulse.watchkitapp.widget
        INFOPLIST_FILE: PulseWatchWatch/Complications/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
    entitlements:
      path: PulseWatchWatch/Complications/PulseWatchWatchWidgetExtension.entitlements
      properties: {}

packages:
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"

schemes:
  PulseWatch:
    build:
      targets:
        PulseWatch: all
    run:
      config: Debug

  PulseWatchWatch:
    build:
      targets:
        PulseWatchWatch: all
    run:
      config: Debug
